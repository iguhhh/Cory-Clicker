<!DOCTYPE html>
<head>
    <title>Cory Clicker</title>
    <link rel="stylesheet" href="./main.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="./app.js"></script>
</head>
<body>
    <div class="content">
        <div class="menus">
            <div class="main">
                <button id="BigCory">
                    <img id="Bcory" src="./images/cory.png" alt="buttonpng" />
                </button>
                <button id="visitB">Construções</button>
                <button id="visitH">Ajuda</button>
                <img id="glow" src="./images/Shine.png" alt="glow" class="center">
                <img id="obama" src="./images/obama.webp"/>
                <img id="Kimg" src="./images/kiryupunch.gif"/>
                <img id="ashtars" src="./images/ashtar.png"/>"
            </div>

            <div class = "buildings">
                <table border="2" bgcolor="white">
                    <thead>
                        <th>Construções</th>
                        <th>Melhorias</th>
                    </thead>
                    <tbody>
                        <td><button id="worker" disabled >Buy worker</button></td>
                        <td><button id="coolerC" disabled>Make Cory cooler </button></td>
                        
                        <tr>
                        <td><button id="ashtar" disabled>ashtarmoment</button></td>
                        <td><button id="payer" disabled>increase paychecks</button></td>
                        
                        </tr>
                        <td><button id="kiryu" disabled>buy kiryu</button></td>
                    </tbody>
                </table>
                <button id="return"> Retornar</button>
            </div>
            
            <div class = "help">
                <button id="return2"> Retornar</button>
                <h1>Como jogar Cory Clicker </h1>
                <p>Clique no Cory para ganhar dinheiro e gaste esse dinheiro em construções e melhorias para ganhar ainda mais dinheiro!</p>
            </div>
        </div>

        <div class="inventory">
            <dl>
            <dt id="money">0 Coryes</dt>
            <dd id="teste">"And thus Cory was born"</dd>
            <dt id="workert">0 Trabalhadores</dt>
            <dt id="salario">0$<  /dt>
            <dt id="coolinator">Cory é 0% mais legal</dt>
            <dt id="army">Army</dt>
            </dl>
        </div>
    </div>
        
</body>
